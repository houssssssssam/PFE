services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexora_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./api:/var/www/api
      - ./backend/docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - nexora
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: nexora_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - nexora
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: nexora_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-nexora}
      MYSQL_USER: ${DB_USERNAME:-nexora}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - nexora

  redis:
    image: redis:7-alpine
    container_name: nexora_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nexora

  reverb:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexora_reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    ports:
      - "8080:8080"
    networks:
      - nexora
    depends_on:
      - mysql
      - redis

  n8n:
    image: n8nio/n8n:latest
    container_name: nexora_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://n8n:5678
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - nexora

  qdrant:
    image: qdrant/qdrant:latest
    container_name: nexora_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - nexora

  minio:
    image: minio/minio:latest
    container_name: nexora_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - nexora

  mailpit:
    image: axllent/mailpit:latest
    container_name: nexora_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - nexora

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: nexora_phpmyadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: nexora
      PMA_PASSWORD: secret
    networks:
      - nexora
    depends_on:
      - mysql

networks:
  nexora:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  n8n_data:
  qdrant_data:
  minio_data:
